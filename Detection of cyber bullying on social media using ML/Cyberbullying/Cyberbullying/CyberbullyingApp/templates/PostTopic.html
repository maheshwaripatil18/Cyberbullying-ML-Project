{% load static %}
<html>
<head>

<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link rel="stylesheet" type="text/css" href="{% static 'style.css' %}"/>
 <script LANGUAGE="Javascript" >
function validate(){
	var c=document.forms["f1"]["description"].value;
	var e=document.forms["f1"]["image"].value;
	
	if(c == null || c==""){
		window.alert("Description No must be enter");
		document.f1.description.focus();
		return false;
	}
	
	if(e == null || e==""){
		window.alert("post image must be upload");
		document.f1.image.focus();
		return false;
	}
	return true;
}
		
	
	</script>
</head>
<body>
<div id="wrapper">
	<div id="header">

		</div>

       <li><a href="{% url 'PostTopic' %}">Post Topic</a></li>

		</center></ul>
<br class="clearfix" />
				</div>

	</div>	
			<center>
<form name="f1" method="post" action={% url 'PostMyTopic' %} enctype="multipart/form-data" OnSubmit="return validate()">
